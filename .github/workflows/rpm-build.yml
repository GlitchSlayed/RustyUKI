name: Fedora RPM Build (CI)

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rpm-build:
    runs-on: ubuntu-latest
    container:
      image: fedora:41

    steps:
      - name: Install build dependencies
        run: |
          dnf -y update
          dnf -y install \
            git \
            rpm-build \
            rpmdevtools \
            cargo \
            rust \
            cargo-rpm-macros \
            rust-packaging \
            dnf-plugins-core

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Mark workspace as a safe Git directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Build SRPM/RPM
        run: |
          set -euo pipefail

          version="$(awk -F '"' '/^version = / {print $2; exit}' Cargo.toml)"
          topdir="$(rpm --eval '%{_topdir}')"

          rpmdev-setuptree

          archive_dir="rustyuki-${version}"
          tarball="${archive_dir}.tar.gz"

          git archive --format=tar.gz --prefix="${archive_dir}/" -o "${topdir}/SOURCES/${tarball}" HEAD
          cp .github/rpm/rustyuki.spec "${topdir}/SPECS/rustyuki.spec"
          sed -i "s/^Version:.*/Version:        ${version}/" "${topdir}/SPECS/rustyuki.spec"

          rpmbuild -br "${topdir}/SPECS/rustyuki.spec"
          buildreq_rpm="$(find "${topdir}/SRPMS" -maxdepth 1 -type f -name "*.buildreqs.nosrc.rpm" | head -n 1)"
          if [[ -z "${buildreq_rpm}" ]]; then
            echo "failed to locate generated buildreqs rpm" >&2
            exit 1
          fi
          dnf -y builddep "${buildreq_rpm}"

          rpmbuild -ba "${topdir}/SPECS/rustyuki.spec"

          mkdir -p dist
          find "${topdir}/RPMS" -type f -name '*.rpm' -exec cp {} dist/ \;
          find "${topdir}/SRPMS" -type f -name '*.src.rpm' -exec cp {} dist/ \;

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-rpm-ci-${{ github.run_number }}
          path: dist/*
          if-no-files-found: error
